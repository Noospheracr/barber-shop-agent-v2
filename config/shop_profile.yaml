booking:
  slot_granularity_min: 15
  buffer_between_appointments_min: 5
  max_advance_days: 30
  cancellation_notice_min: 120     # 2h courtesy window

retention:                         # the style-based recontact cadence
  recontact_days:
    short: 15                      # "sharpen-up" nudge
    medium: 21
    long: 21
  selfie_discount_pct: 10          # TODO — confirm offer
  quiet_hours: {start: "20:00", end: "08:00"}
  max_marketing_msgs_per_cycle: 1

comms:
  reminder_offsets: ["-24h", "-2.5h"]
  followup_offset: "+3h"
  channels_enabled: [whatsapp, sms, email]
  default_channel: whatsapp
